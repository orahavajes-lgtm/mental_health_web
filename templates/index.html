<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mental Health Predictor</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.card {
    background: white;
    width: 60%;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}

h1 {
    text-align: center;
}

form {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
}

label {
    font-size: 14px;
    margin-top: 10px;
}

select {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    padding: 12px;
    background: #00c6ff;
    border: none;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #0072ff;
}

.result {
    text-align: center;
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
}
</style>

</head>
<body>

<div class="card">

<h1>Mental Health AI Checker</h1>

<form method="POST" action="/predict">

<label>Select Prediction Model</label>
<select name="model_type">
    <option>Decision Tree</option>
    <option>Neural Network</option>
</select>

<label>What is your gender?</label>
<select name="Gender">
    <option>Male</option>
    <option>Female</option>
</select>

<label>What is your occupation?</label>
<select name="Occupation">
    <option>Corporate</option>
    <option>Student</option>
    <option>Business</option>
    <option>Housewife</option>
    <option>Others</option>
</select>

<label>Are you self-employed?</label>
<select name="self_employed">
    <option>No</option>
    <option>Yes</option>
</select>

<label>Do you have family history of mental health issues?</label>
<select name="family_history">
    <option>No</option>
    <option>Yes</option>
</select>

<label>Days Indoors</label>
<select name="Days_Indoors">
    <option>Go out Every day</option>
    <option>1-14 days</option>
    <option>15-30 days</option>
    <option>31-60 days</option>
    <option>More than 2 months</option>
</select>

<label>Growing Stress</label>
<select name="Growing_Stress">
    <option>No</option>
    <option>Maybe</option>
    <option>Yes</option>
</select>

<label>Changes Habits</label>
<select name="Changes_Habits">
    <option>No</option>
    <option>Maybe</option>
    <option>Yes</option>
</select>

<label>Mental Health History</label>
<select name="Mental_Health_History">
    <option>No</option>
    <option>Maybe</option>
    <option>Yes</option>
</select>

<label>Mood Swings</label>
<select name="Mood_Swings">
    <option>Low</option>
    <option>Medium</option>
    <option>High</option>
</select>

<label>Coping Struggles</label>
<select name="Coping_Struggles">
    <option>No</option>
    <option>Yes</option>
</select>

<label>Work Interest</label>
<select name="Work_Interest">
    <option>No</option>
    <option>Maybe</option>
    <option>Yes</option>
</select>

<label>Social Weakness</label>
<select name="Social_Weakness">
    <option>No</option>
    <option>Maybe</option>
    <option>Yes</option>
</select>

<label>Mental Health Interview</label>
<select name="mental_health_interview">
    <option>No</option>
    <option>Maybe</option>
    <option>Yes</option>
</select>

<label>Care Options</label>
<select name="care_options">
    <option>No</option>
    <option>Not sure</option>
    <option>Yes</option>
</select>

<button type="submit">Check Now</button>

</form>

{% if prediction_text %}
<div class="result">
    {{ prediction_text }}
</div>
{% endif %}

</div>

</body>
</html>
